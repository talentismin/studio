  <span class="eyebrow">iOS App</span>
  <h1>隨身書房 Pocket Bookroom</h1>
  <p class="lede">輕薄、可離線、聽中文的小說閱讀器。把 EPUB / TXT 一鍵丟進來，路上、睡前、運動時都能讀（或聽）。</p>

  <div class="card">
    <h2>主要功能</h2>
    <ul>
      <li>支援 EPUB / TXT，匯入後完全離線可讀</li>
      <li>繁中 TTS 朗讀，可調速、可背景播放</li>
      <li>章節導航、自動記住閱讀位置</li>
      <li>夜間模式、字級調整、護眼配色</li>
      <li>純本地儲存，不上傳任何書籍內容</li>
    </ul>
  </div>
